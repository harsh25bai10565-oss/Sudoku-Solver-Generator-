
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku AI Solver & Generator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Sudoku AI Solver & Generator</h1>
        <div class="description">
            <p>Enter a Sudoku puzzle (use <strong>0</strong> for empty cells) or generate one. Click <strong>Solve</strong> to get the solution, or <strong>Predict Difficulty</strong> to guess its difficulty using ML.</p>
        </div>
        <div class="sudoku-grid" id="sudoku-grid">
            <!-- 9x9 grid will be built by JS -->
        </div>
        <div class="controls">
            <button id="solve-btn">Solve</button>
            <button id="generate-btn">Generate</button>
            <button id="predict-btn">Predict Difficulty</button>
            <select id="difficulty-select">
                <option value="easy">Easy</option>
                <option value="medium" selected>Medium</option>
                <option value="hard">Hard</option>
            </select>
            <button id="clear-btn">Clear</button>
        </div>
        <div id="message" class="message"></div>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
